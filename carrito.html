    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/carrito.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cartItemsContainer = document.getElementById('cart-items');
            const totalElement = document.getElementById('cart-total');
            const checkoutModal = document.getElementById('checkout-modal');
            const checkoutModalContent = document.getElementById('checkout-modal-content');

            function renderCart() {
                const cart = getCart();
                if (cart.length > 0) {
                    cartItemsContainer.innerHTML = '';
                    let total = 0;
                    cart.forEach(item => {
                        // Use numericPrice if available, otherwise parse string
                        let price = item.numericPrice;
                        if (!price) {
                            // Robust parsing: remove currency and all separators if no decimal is detected
                            // or assume dots are thousand separators if followed by 3 digits (common in user's case)
                            let cleanPrice = item.price.replace('$', '').trim();
                            if (cleanPrice.includes('.') && cleanPrice.split('.').pop().length === 3) {
                                cleanPrice = cleanPrice.replace(/\./g, '');
                            }
                            price = parseFloat(cleanPrice.replace(/,/g, ''));
                        }

                        total += price * item.quantity;

                        const itemElement = document.createElement('div');
                        itemElement.className = 'flex items-center gap-6 p-4 bg-white dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-800';
                        itemElement.innerHTML = `
                            <div class="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden flex-shrink-0">
                                <img src="${item.image}" class="w-full h-full object-contain">
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-lg">${item.name}</h3>
                                <p class="text-slate-500 font-bold">${item.price}</p>
                                <div class="flex items-center gap-4 mt-2">
                                    <div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
                                        <button onclick="changeQty('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors">
                                            <span class="material-symbols-outlined text-sm">remove</span>
                                        </button>
                                        <span class="text-sm font-bold w-6 text-center">${item.quantity}</span>
                                        <button onclick="changeQty('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors hover:text-primary">
                                            <span class="material-symbols-outlined text-sm">add</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <button onclick="handleDelete('${item.id}')" class="text-slate-400 hover:text-red-500 transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        `;
                        cartItemsContainer.appendChild(itemElement);
                    });
                    totalElement.textContent = `$${total.toLocaleString()}`;
                } else {
                    cartItemsContainer.innerHTML = '<p class="text-slate-500 text-center py-12">Tu bolsa está vacía.</p>';
                    totalElement.textContent = '$0.00';
                }
            }

            window.changeQty = (id, delta) => {
                updateQuantity(id, delta);
                renderCart();
            };

            window.handleDelete = (id) => {
                deleteItemFromCart(id);
                renderCart();
            };

            window.handleRemove = (id) => {
                removeFromCart(id);
                renderCart();
            };

            renderCart();
        });
    </script>
</body>
